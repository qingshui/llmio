# /etc/nginx/conf.d/llmio.conf
# nginx 监听 8801，按端点路径路由到 LLMIO(8070) 的 openai / anthropic 接入
#
# 客户端统一用根路径调用:
#   POST /v1/chat/completions   -> 改写为 /openai/v1/chat/completions  (OpenAI 风格)
#   POST /v1/messages           -> 改写为 /anthropic/v1/messages        (Anthropic 风格)
#   GET  /v1/models             -> 改写为 /openai/v1/models
# 鉴权 header 原样透传（LLMIO 三种 header 跨协议互通，无需改）。

upstream llmio_backend {
    server 127.0.0.1:8070;
    keepalive 32;
}

server {
    listen 8801;
    server_name _;

    # 关键：流式响应必须关闭缓冲，否则 SSE 会被 nginx 缓存卡住
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 长对话 / 思考模型需要较长超时
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;

    # ---------- OpenAI 风格端点 -> /openai/v1 ----------
    # /v1/chat/completions, /v1/responses, /v1/models
    location ~ ^/v1/(chat/completions|responses|models)(/.*)?$ {
        proxy_pass http://llmio_backend/openai/v1/$1$2;
    }

    # ---------- Anthropic 风格端点 -> /anthropic/v1 ----------
    # /v1/messages, /v1/messages/count_tokens
    location ~ ^/v1/(messages|messages/count_tokens)(/.*)?$ {
        proxy_pass http://llmio_backend/anthropic/v1/$1$2;
    }

    # ---------- Claude Code 事件日志 ----------
    location = /api/event_logging/batch {
        proxy_pass http://llmio_backend/anthropic/api/event_logging/batch;
    }

    # ---------- 管理后台 /api 透传（如需通过 8801 访问控制台 API）----------
    location /api/ {
        proxy_pass http://llmio_backend;
    }

    # ---------- 前端静态资源与控制台（如需通过 8801 访问 webui）----------
    location / {
        proxy_pass http://llmio_backend;
    }
}
